name: Refresh Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch xlsx from Google Sheets
        run: go run ./cmd/meters fetch

      - name: Build data.json
        run: go run ./cmd/meters build

      - name: Commit updated data.json if changed
        run: |
          git diff --quiet data.json || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: refresh data.json"
            git push
          }

      - name: Prepare deploy artifact
        run: |
          mkdir -p _site
          cp index.html data.json _site/
          cp -r site _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
